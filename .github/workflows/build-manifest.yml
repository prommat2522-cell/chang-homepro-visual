name: Build Visual Manifest

on:
  push:
    branches:
      - main
    paths:
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.webp"
      - "scripts/generate-manifest.mjs"
      - ".github/workflows/build-manifest.yml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate manifest.json
        env:
          VISUAL_BASE_URL: https://prommat2522-cell.github.io/chang-homepro-visual
        run: |
          node scripts/generate-manifest.mjs

      - name: Commit manifest if changed
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- manifest.json)" ]; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add manifest.json
          git commit -m "Auto update manifest.json"
          git push
          